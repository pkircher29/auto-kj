name: Build Auto-KJ Windows

on:
  push:
    branches: [master, main, release-fix-clean]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebengine'

      - name: Install GStreamer SDK
        shell: powershell
        run: |
          $url = "https://github.com/pkircher29/gstreamer/releases/download/gst-sdk-1.26.9/gstreamer-sdk-1.26.9.zip"
          curl.exe -L --retry 5 --retry-delay 3 -o gstreamer-sdk.zip $url
          if (!(Test-Path "gstreamer-sdk.zip")) { throw "GStreamer SDK download failed" }
          Expand-Archive -Path gstreamer-sdk.zip -DestinationPath "C:\gstreamer-sdk" -Force
          if (!(Test-Path "C:\gstreamer-sdk\bin")) { throw "GStreamer SDK extract failed" }
          echo "GST_BASE_PATH=C:\gstreamer-sdk" >> $env:GITHUB_ENV

      - name: Install OpenSSL 1.1
        shell: powershell
        run: |
          $url = "https://slproweb.com/download/Win64OpenSSL-1_1_1w.exe"
          curl.exe -L --retry 3 -o openssl-installer.exe $url
          Start-Process -FilePath openssl-installer.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
          $sslDll = Get-ChildItem -Path "C:\Program Files\OpenSSL*\bin" -Filter "libssl-1_1-x64.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sslDll) { throw "OpenSSL 1.1 DLLs not found after install" }
          Write-Host "Found OpenSSL at: $($sslDll.DirectoryName)"
          echo "OPENSSL_BIN=$($sslDll.DirectoryName)" >> $env:GITHUB_ENV
          
      - name: Verify OpenSSL DLLs
        shell: powershell
        run: |
          $dlls = @("libssl-1_1-x64.dll", "libcrypto-1_1-x64.dll")
          $searchDirs = @(
            "$env:QT_ROOT_DIR\bin",
            "$env:OPENSSL_BIN",
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\OpenSSL\bin"
          )
          foreach ($dll in $dlls) {
            $found = $false
            foreach ($dir in $searchDirs) {
              if (Test-Path "$dir\$dll") { $found = $true; break }
            }
            if (-not $found) { throw "Missing OpenSSL DLL: $dll" }
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            "-DDEPLOY_DEPS=OFF" `
            "-DQT_INSTALL_PREFIX=$env:Qt5_DIR\..\..\.." `
            "-DGST_BASE_PATH=$env:GST_BASE_PATH"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage release bundle
        shell: powershell
        run: |
          $buildDir = "build\Release"
          $buildBinDir = "build\bin\Release"
          $releaseDir = "release"

          if (!(Test-Path "$buildDir\auto-kj.exe")) {
            throw "Expected built executable not found at $buildDir\auto-kj.exe"
          }

          Remove-Item $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item "$buildDir\auto-kj.exe" -Destination $releaseDir -Force

          $qt5KeychainDll = Join-Path $buildBinDir "qt5keychain.dll"
          $qtBinDir = Join-Path $env:Qt5_Dir "bin"
          $qtBinKeychainDll = Join-Path $qtBinDir "qt5keychain.dll"
          $seededQtBinKeychain = $false
          if (Test-Path $qt5KeychainDll) {
            Copy-Item $qt5KeychainDll -Destination $releaseDir -Force
            Copy-Item $qt5KeychainDll -Destination $qtBinKeychainDll -Force
            $seededQtBinKeychain = $true
          }

          try {
            $env:PATH = "$buildBinDir;$releaseDir;$env:PATH"
            & "$env:Qt5_Dir\bin\windeployqt.exe" --release --no-translations --dir "$releaseDir" "$releaseDir\auto-kj.exe"
          }
          finally {
            if ($seededQtBinKeychain -and (Test-Path $qtBinKeychainDll)) {
              Remove-Item $qtBinKeychainDll -Force -ErrorAction SilentlyContinue
            }
          }

          $requiredQtPaths = @(
            "$releaseDir\Qt5Core.dll",
            "$releaseDir\Qt5Gui.dll",
            "$releaseDir\Qt5Widgets.dll",
            "$releaseDir\platforms\qwindows.dll"
          )
          foreach ($path in $requiredQtPaths) {
            if (!(Test-Path $path)) {
              throw "windeployqt did not produce required runtime file: $path"
            }
          }

          $gstBin = "$env:GST_BASE_PATH\bin"
          Copy-Item "$gstBin\*.dll" -Destination $releaseDir -Force

          # GStreamer plugins: Roger's custom SDK has all gst*.dll in bin/ (flat),
          # but GStreamer at runtime expects them in lib/gstreamer-1.0/.
          # Copy gst*.dll from bin/ into lib/gstreamer-1.0/ so GST_PLUGIN_SYSTEM_PATH works.
          $destPluginsDir = Join-Path $releaseDir "lib\gstreamer-1.0"
          New-Item -ItemType Directory -Force -Path $destPluginsDir | Out-Null
          $gstPlugins = Get-ChildItem -Path "$gstBin\gst*.dll" -File -ErrorAction SilentlyContinue
          if ($gstPlugins.Count -gt 0) {
            Copy-Item "$gstBin\gst*.dll" -Destination $destPluginsDir -Force
            Write-Host "Copied $($gstPlugins.Count) GStreamer plugin DLLs to $destPluginsDir"
          } else {
            # Fallback: check for standard lib/gstreamer-1.0 directory
            $gstPluginsDir = "$env:GST_BASE_PATH\lib\gstreamer-1.0"
            if (Test-Path $gstPluginsDir) {
              Copy-Item "$gstPluginsDir\*.dll" -Destination $destPluginsDir -Force
              Write-Host "Copied GStreamer plugins from lib dir to $destPluginsDir"
            } else {
              Write-Host "WARNING: No GStreamer plugins found anywhere"
            }
          }

          # Copy GStreamer plugin scanner and libexec
          $gstLibexecDir = "$env:GST_BASE_PATH\libexec\gstreamer-1.0"
          if (Test-Path $gstLibexecDir) {
            $destLibexecDir = Join-Path $releaseDir "libexec\gstreamer-1.0"
            New-Item -ItemType Directory -Force -Path $destLibexecDir | Out-Null
            Copy-Item "$gstLibexecDir\*" -Destination $destLibexecDir -Recurse -Force
            Write-Host "Copied GStreamer libexec to $destLibexecDir"
          } else {
            # Check for gst-plugin-scanner in bin/ (flat SDK)
            $scanner = Get-ChildItem -Path "$gstBin\gst-plugin-scanner*" -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($scanner) {
              $destLibexecDir = Join-Path $releaseDir "libexec\gstreamer-1.0"
              New-Item -ItemType Directory -Force -Path $destLibexecDir | Out-Null
              Copy-Item $scanner.FullName -Destination $destLibexecDir -Force
              Write-Host "Copied gst-plugin-scanner from bin to $destLibexecDir"
            } else {
              Write-Host "WARNING: GStreamer plugin scanner not found"
            }
          }

          # Copy GIO modules (required for network/TLS in GStreamer)
          $gioModulesDir = "$env:GST_BASE_PATH\lib\gio\modules"
          if (Test-Path $gioModulesDir) {
            $destGioDir = Join-Path $releaseDir "lib\gio\modules"
            New-Item -ItemType Directory -Force -Path $destGioDir | Out-Null
            Copy-Item "$gioModulesDir\*.dll" -Destination $destGioDir -Force
            Write-Host "Copied GIO modules to $destGioDir"
          } else {
            Write-Host "WARNING: GIO modules directory not found at $gioModulesDir"
          }

          $openSslNames = @(
            "libssl-1_1-x64.dll",
            "libcrypto-1_1-x64.dll"
          )
          $searchDirs = @(
            "$env:Qt5_Dir\bin",
            "$env:OPENSSL_BIN",
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\OpenSSL\bin"
          )

          foreach ($dll in $openSslNames) {
            $copied = $false
            foreach ($dir in $searchDirs) {
              $candidate = Join-Path $dir $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate -Destination $releaseDir -Force
                Write-Host "Collected $dll from $dir"
                $copied = $true
                break
              }
            }
            if (-not $copied) {
              throw "Missing required OpenSSL runtime DLL: $dll"
            }
          }

          $extraRuntimeDlls = @(
            "spdlog.dll",
            "qrencode.dll",
            "libqrencode.dll"
          )
          $extraSearchRoots = @(
            "build\Release",
            "build",
            "$env:Qt5_DIR\..\..\..\bin",
            "$env:QT_ROOT_DIR\bin",
            "C:\gstreamer-sdk\bin",
            "$env:VCPKG_ROOT\installed\x64-windows\bin",
            "$env:VCPKG_ROOT\installed\x64-windows-release\bin",
            "$env:USERPROFILE\vcpkg\installed\x64-windows\bin",
            "$env:USERPROFILE\vcpkg\installed\x64-windows-release\bin"
          ) | Where-Object { $_ -and (Test-Path $_) }

          foreach ($dll in $extraRuntimeDlls) {
            if (Test-Path (Join-Path $releaseDir $dll)) {
              continue
            }

            $copied = $false
            foreach ($root in $extraSearchRoots) {
              $candidate = Join-Path $root $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate -Destination $releaseDir -Force
                Write-Host "Collected $dll from $root"
                $copied = $true
                break
              }
            }

            if (-not $copied) {
              foreach ($root in $extraSearchRoots) {
                $candidate = Get-ChildItem -Path $root -Filter $dll -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($candidate) {
                  Copy-Item $candidate.FullName -Destination $releaseDir -Force
                  Write-Host "Collected $dll from $($candidate.DirectoryName)"
                  $copied = $true
                  break
                }
              }
            }

            if (-not $copied) {
              Write-Host "Optional runtime DLL not found during staging: $dll"
            }
          }

          $dependents = (& dumpbin /DEPENDENTS "$releaseDir\auto-kj.exe" 2>$null) -join "`n"
          foreach ($required in @("spdlog.dll", "qrencode.dll", "libqrencode.dll")) {
            if ($dependents -match [regex]::Escape($required) -and -not (Test-Path (Join-Path $releaseDir $required))) {
              throw "Missing required runtime DLL: $required (imported by auto-kj.exe but not staged)"
            }
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Runtime.UCRTSDK -property installationPath
            if ($installPath) {
              $redist = Get-ChildItem -Path "$installPath\VC\Redist\MSVC" -Filter "vc_redist.x64.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
              if ($redist) {
                Copy-Item $redist -Destination $releaseDir -Force
              }
            }
          }

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "$releaseDir\LICENSE.txt" -Force
          }

          Remove-Item "Auto-KJ-Windows-x64.zip" -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "Auto-KJ-Windows-x64.zip" -Force

      - name: Build installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "cd\Output" | Out-Null
          Copy-Item "release\*" -Destination "cd\Output\" -Recurse -Force
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "cd\auto-kj64.iss"

      - name: Upload portable bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: Auto-KJ-Windows-x64-portable
          path: Auto-KJ-Windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: Auto-KJ-Windows-x64-installer
          path: cd/Output/Auto-KJ-Windows-x64-Setup.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Auto-KJ-Windows-x64.zip
            cd/Output/Auto-KJ-Windows-x64-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
