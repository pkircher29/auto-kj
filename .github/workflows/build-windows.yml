name: Build Auto-KJ Windows

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 5.15.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebengine'

      - name: Install GStreamer
        shell: powershell
        run: |
          $gsUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/1.24.0/msvc/gstreamer-1.0-msvc-x86_64-1.24.0.msi"
          Invoke-WebRequest -Uri $gsUrl -OutFile gstreamer.msi
          Start-Process msiexec.exe -ArgumentList '/i', "$PWD\gstreamer.msi", '/quiet', '/norestart' -Wait

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        shell: powershell
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            "-DDEPLOY_DEPS=ON" `
            "-DQT_INSTALL_PREFIX=$env:Qt5_DIR\..\..\.." `
            "-DGST_BASE_PATH=C:\gstreamer\1.0\msvc_x86_64"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage release bundle
        shell: powershell
        run: |
          $releaseDir = "build\Release"
          & "$env:Qt5_DIR\bin\windeployqt.exe" --release --no-translations "$releaseDir\auto-kj.exe"

          $gstBin = "C:\gstreamer\1.0\msvc_x86_64\bin"
          Copy-Item "$gstBin\*.dll" -Destination $releaseDir -Force

          $openSslNames = @(
            "libssl-1_1-x64.dll",
            "libcrypto-1_1-x64.dll"
          )
          $searchDirs = @(
            "$env:Qt5_DIR\bin",
            "C:\Program Files\OpenSSL-Win64\bin"
          )

          foreach ($dll in $openSslNames) {
            $copied = $false
            foreach ($dir in $searchDirs) {
              $candidate = Join-Path $dir $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate -Destination $releaseDir -Force
                Write-Host "Collected $dll from $dir"
                $copied = $true
                break
              }
            }
            if (-not $copied) {
              throw "Missing required OpenSSL runtime DLL: $dll"
            }
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Runtime.UCRTSDK -property installationPath
            if ($installPath) {
              $redist = Get-ChildItem -Path "$installPath\VC\Redist\MSVC" -Filter "vc_redist.x64.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
              if ($redist) {
                Copy-Item $redist -Destination $releaseDir -Force
              }
            }
          }

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "$releaseDir\LICENSE.txt" -Force
          }

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "$releaseDir\*" -Destination "release\" -Recurse -Force
          Compress-Archive -Path "release\*" -DestinationPath "Auto-KJ-Windows-x64.zip" -Force

      - name: Build installer
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "cd\auto-kj64.iss"

      - name: Upload portable bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auto-KJ-Windows-x64-portable
          path: Auto-KJ-Windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auto-KJ-Windows-x64-installer
          path: cd/Output/*.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Auto-KJ-Windows-x64.zip
            cd/Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
